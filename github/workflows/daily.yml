name: Daily Hulk Bot
on:
  schedule:
    - cron: '0 0 * * *' # Yeh har raat 12 baje khud chalega
  workflow_dispatch: # Taaki aap abhi button daba kar check kar saken
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Libs
        run: pip install google-generativeai gTTS requests
      - name: Run Bot
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python bot.py
        
