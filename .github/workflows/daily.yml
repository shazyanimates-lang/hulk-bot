name: Daily Hulk Bot

on:
  workflow_dispatch: # Taaki aap button daba kar khud chala sakein

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install requests gTTS

      - name: Run Bot
        # NOTE: Agar aapki file ka naam 'bot.py' hai toh niche 'start_bot.py' ko badal kar 'bot.py' kar dein
        run: python start_bot.py 

      - name: Check File
        run: ls -lh # Isse pata chal jayega ke video file waqai bani hai

      - name: Upload Video Artifact
        if: always() # Agar script fail bhi ho jaye tab bhi koshish karega upload ki
        uses: actions/upload-artifact@v4
        with:
          name: Hulk-Video
          path: short_video.mp4
