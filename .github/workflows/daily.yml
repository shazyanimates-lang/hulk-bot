name: Generate AI Short Video

on:
  workflow_dispatch: # Isse aap manually "Run" button daba kar video bana sakte hain

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python Libraries
      run: |
        pip install requests gTTS

    - name: Run Script to Generate Video
    # Yahan aapki python file ka naam bot.py hona chahiye
      run: python bot.py 

    - name: Upload Video as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hulk-Karachi-Short
        path: short_video.mp4
