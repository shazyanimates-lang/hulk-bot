name: Daily Hulk Bot
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # Isse "Run" button aa jayega
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Libs
        run: pip install google-generativeai gTTS requests
      - name: Run Bot
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python bot.py
        
