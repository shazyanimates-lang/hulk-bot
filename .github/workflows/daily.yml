name: Hulk Pro AI Bot
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install requests elevenlabs google-generativeai Pillow
      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVEN_API_KEY: ${{ secrets.ELEVEN_API_KEY }}
        run: python bot.py
      - name: Upload Video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Hulk-Final-Result
          path: short_video.mp4
          
